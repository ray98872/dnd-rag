services:
  # ── Qdrant vector database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: dnd-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333 && echo -e \"GET /healthz HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── RAG API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: dnd-rag-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333   # override .env URL to use Docker network
    volumes:
      # Mount model cache so weights aren't re-downloaded on container restart
      - hf_cache:/app/.cache/huggingface
      # Mount data dir so SRD PDF and processed chunks persist
      - ./data:/app/data
      # Mount source for live reloading — no rebuild needed for code changes
      - ./src:/app/src
      - ./scripts:/app/scripts
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  qdrant_data:
    driver: local
  hf_cache:
    driver: local
